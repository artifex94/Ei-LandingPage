<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="housing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="0.24" stop-color="#475569"/>
      <stop offset="0.72" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="barrel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="0.35" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="lug" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="0.55" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Retro camera body only. TRUE SIDE PROFILE. Lug center exactly (409.6, 307.2); body axis tilted 30deg down-right. -->
  <g transform="rotate(30 409.6 307.2)">
    <!-- boxy 1970s/80s housing: bold simple side silhouette -->
    <path d="M350 252 H632 L684 304 V414 L632 466 H350 Q328 466 328 444 V274 Q328 252 350 252 Z" fill="url(#housing)" stroke="#64748b" stroke-width="8" stroke-linejoin="round"/>
    <path d="M369 270 H620 L662 312" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" opacity="0.38" fill="none"/>
    <path d="M368 451 H620 L662 410" stroke="#1e293b" stroke-width="9" stroke-linecap="round" opacity="0.55" fill="none"/>

    <!-- small top mounting lug centered at shared pivot, attached to rear third -->
    <path d="M371.6 279.2 H447.6 Q461.6 279.2 461.6 293.2 V321.2 Q461.6 335.2 447.6 335.2 H371.6 Q357.6 335.2 357.6 321.2 V293.2 Q357.6 279.2 371.6 279.2 Z" fill="url(#lug)" stroke="#64748b" stroke-width="7"/>
    <circle cx="409.6" cy="307.2" r="19" fill="#334155" stroke="#94a3b8" stroke-width="8"/>
    <path d="M390 307.2 H430" stroke="#1e293b" stroke-width="8" stroke-linecap="round"/>

    <!-- thick horizontal ventilation grooves on the flat left flank -->
    <path d="M382 314 H538" stroke="#1e293b" stroke-width="12" stroke-linecap="round" opacity="0.86"/>
    <path d="M382 359 H558" stroke="#1e293b" stroke-width="12" stroke-linecap="round" opacity="0.86"/>
    <path d="M382 404 H528" stroke="#1e293b" stroke-width="12" stroke-linecap="round" opacity="0.86"/>

    <!-- two visible screw heads -->
    <circle cx="610" cy="314" r="18" fill="#475569" stroke="#94a3b8" stroke-width="7"/>
    <path d="M598 314 H622" stroke="#1e293b" stroke-width="7" stroke-linecap="round"/>
    <circle cx="610" cy="406" r="18" fill="#475569" stroke="#94a3b8" stroke-width="7"/>
    <path d="M598 406 H622" stroke="#1e293b" stroke-width="7" stroke-linecap="round"/>

    <!-- single orange brand accent stripe along lower housing edge -->
    <path d="M354 456 H624" stroke="#f17720" stroke-width="10" stroke-linecap="round"/>

    <!-- protruding side-view cylindrical lens barrel; rectangle/ridges only, no circular lens face -->
    <path d="M684 284 H886 Q906 284 906 304 V366 Q906 386 886 386 H684 Z" fill="url(#barrel)" stroke="#64748b" stroke-width="8" stroke-linejoin="round"/>
    <!-- chunky focus-ring ridges, side-profile bands -->
    <rect x="712" y="269" width="36" height="132" rx="10" fill="#475569" stroke="#94a3b8" stroke-width="7"/>
    <rect x="810" y="269" width="36" height="132" rx="10" fill="#475569" stroke="#94a3b8" stroke-width="7"/>
    <path d="M696 298 H886" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
    <path d="M696 374 H886" stroke="#1e293b" stroke-width="8" stroke-linecap="round" opacity="0.45"/>

    <!-- flat dark barrel tip at front: side-profile sliver only, no circular lens face -->
    <rect x="906" y="290" width="13" height="90" rx="4" fill="#1e293b" stroke="#64748b" stroke-width="6"/>
    <rect x="916" y="307" width="4" height="56" fill="#0f172a"/>
  </g>
</svg>
