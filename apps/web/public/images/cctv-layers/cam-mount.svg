<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="0.35" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="0.18" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="ball" cx="32%" cy="25%" r="75%">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="0.28" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="b"/>
      <feOffset dx="0" dy="1" result="o"/>
      <feComposite in="SourceGraphic" in2="o" operator="over"/>
    </filter>
  </defs>
  <g filter="url(#soft)">
    <!-- ceiling plate flush with top edge -->
    <path d="M314 0 H536 Q552 0 552 16 V48 Q552 64 536 64 H314 Q298 64 298 48 V16 Q298 0 314 0 Z" fill="url(#metal)"/>
    <path d="M316 9 H528" stroke="#64748b" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <path d="M324 52 H514" stroke="#020617" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <circle cx="342" cy="34" r="7" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <circle cx="512" cy="34" r="7" fill="#0f172a" stroke="#334155" stroke-width="2"/>

    <!-- short articulated arm descending to shared pivot (410,307) -->
    <path d="M421 60 C421 101 419 137 414 170" stroke="#334155" stroke-width="38" stroke-linecap="round" fill="none"/>
    <path d="M421 60 C421 101 419 137 414 170" stroke="#0f172a" stroke-width="26" stroke-linecap="round" fill="none"/>
    <path d="M407 174 L450 219 Q458 227 451 237 L427 270 Q420 279 409 272 L366 227 Q358 219 365 210 L389 180 Q396 171 407 174 Z" fill="url(#dark)"/>
    <path d="M382 207 L433 253" stroke="#475569" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <path d="M405 188 L444 224" stroke="#64748b" stroke-width="3" stroke-linecap="round" opacity="0.32"/>

    <!-- ball joint center exactly 0.40,0.30 => (409.6,307.2) -->
    <circle cx="409.6" cy="307.2" r="54" fill="url(#ball)"/>
    <ellipse cx="409.6" cy="307.2" rx="55" ry="18" fill="none" stroke="#f17720" stroke-width="5" opacity="0.92" transform="rotate(-20 409.6 307.2)"/>
    <path d="M381 274 Q405 256 437 269" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" opacity="0.35" fill="none"/>
    <circle cx="392" cy="287" r="8" fill="#64748b" opacity="0.22"/>
  </g>
</svg>
